<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Apex SEO Blog</title>
    <meta name="description" content="{{excerpt}}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Typography Plugin for nice blog post formatting -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <!-- Header -->
    <header class="fixed w-full top-0 z-50 transition-all duration-300 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="../index.html" class="flex items-center group">
                        <img src="../assets/apex-logo.png" alt="Apex SEO" class="h-10 transition-transform duration-300 group-hover:scale-105">
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="../index.html#features" class="text-sm font-medium text-slate-600 hover:text-primary-600 transition-colors">Features</a>
                    <a href="../index.html#pricing" class="text-sm font-medium text-slate-600 hover:text-primary-600 transition-colors">Pricing</a>
                    <a href="../signup.html" class="bg-primary-600 text-white px-5 py-2.5 rounded-full hover:bg-primary-700 transition-all shadow-lg shadow-primary-500/30 text-sm font-semibold hover:-translate-y-0.5">Start Free Trial</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Content -->
    <main class="pt-32 pb-20">
        <article class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Featured Image -->
            <div class="rounded-2xl overflow-hidden mb-10 shadow-xl border border-slate-200">
                <img src="{{FEATURED_IMAGE}}" alt="{{TITLE}}" class="w-full h-auto object-cover max-h-[500px]">
            </div>

            <!-- Header -->
            <div class="text-center mb-12">
                <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-6 leading-tight">{{TITLE}}</h1>
                <div class="flex items-center justify-center gap-4 text-slate-500 text-sm">
                    <span>{{DATE}}</span>
                    <span>•</span>
                    <span>{{READ_TIME}} min read</span>
                </div>
            </div>

            <!-- Body -->
            <div class="prose prose-slate prose-lg max-w-none prose-headings:font-bold prose-headings:text-slate-900 prose-a:text-primary-600 prose-img:rounded-xl">
                {{CONTENT}}
            </div>
            
            <!-- CTA -->
            <div class="mt-20 p-10 bg-slate-900 rounded-2xl text-center relative overflow-hidden">
                <div class="absolute inset-0 bg-primary-900/20"></div>
                <div class="relative z-10">
                    <h3 class="text-2xl font-bold text-white mb-4">Scale your content like this</h3>
                    <p class="text-slate-300 mb-8">This post was generated automatically by Apex SEO. Start building your own topical authority today.</p>
                    <a href="../signup.html" class="inline-block bg-primary-600 text-white px-8 py-3 rounded-full font-bold hover:bg-primary-500 transition-all">
                        Start Free Trial
                    </a>
                </div>
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-400 py-12 border-t border-slate-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2026 Apex SEO. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
