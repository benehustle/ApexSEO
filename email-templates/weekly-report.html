<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f3f4f6; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #6366f1; color: white; padding: 30px 20px; text-align: center; border-radius: 8px 8px 0 0; }
    .content { background: white; padding: 30px 20px; border: 1px solid #e5e7eb; }
    .stat-box { background: #f3f4f6; padding: 20px; margin: 15px 0; border-radius: 8px; text-align: center; }
    .stat-number { font-size: 36px; font-weight: bold; color: #3b82f6; margin: 0; }
    .stat-label { margin: 5px 0 0 0; color: #6b7280; font-size: 14px; }
    .button { display: inline-block; background: #3b82f6; color: white; padding: 12px 30px; text-decoration: none; border-radius: 6px; margin-top: 20px; }
    .top-posts { list-style: none; padding: 0; }
    .top-posts li { padding: 10px; margin: 10px 0; background: #f9fafb; border-radius: 6px; }
    .footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; background: #f9fafb; border-radius: 0 0 8px 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 style="margin: 0;">📊 Weekly Report</h1>
      <p style="margin: 10px 0 0 0; font-size: 16px;">{{weekStart}} - {{weekEnd}}</p>
    </div>
    <div class="content">
      <h2 style="color: #1f2937; margin-top: 0;">Performance Summary</h2>
      
      <div class="stat-box">
        <div class="stat-number">{{blogsPublished}}</div>
        <p class="stat-label">Blogs Published</p>
      </div>
      
      <div class="stat-box">
        <div class="stat-number">{{totalViews}}</div>
        <p class="stat-label">Total Page Views</p>
      </div>
      
      <div class="stat-box">
        <div class="stat-number">{{avgTimeOnPage}}s</div>
        <p class="stat-label">Avg Time on Page</p>
      </div>
      
      <h3 style="margin-top: 30px; color: #1f2937;">Top Performing Posts</h3>
      <ol class="top-posts">
        {{topPosts}}
      </ol>
      
      <div style="text-align: center;">
        <a href="{{dashboardUrl}}" class="button">View Full Analytics</a>
      </div>
    </div>
    <div class="footer">
      <p>© 2026 AI Blog Automation. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
